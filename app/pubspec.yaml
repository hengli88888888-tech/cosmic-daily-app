name: cosmic_daily_app
description: Oraya app for personal insight, timing guidance, and question-based readings
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  purchases_flutter: ^9.14.0
  flutter_timezone: ^4.1.1
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/oraya/oraya-brand-hero.png
    - assets/branding/oraya/oraya-icon-square-1024.png
